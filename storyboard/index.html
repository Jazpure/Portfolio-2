<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a1a;
    --paper: #f5f2eb;
    --rule: #c8c0b0;
    --num: #9a8f80;
    --textarea-bg: #fdfaf4;
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 48px 40px 64px;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 40px;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 16px;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.02em;
  }
  header span {
    font-size: 11px;
    color: var(--num);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .grid {
    overflow: visible;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px 24px;
  }
  .cell {
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    cursor: pointer;
    position: relative;
    z-index: 0;
  }
  .cell:hover, .cell.expanded {
    transform: scale(1.35);
    z-index: 10;
  }
  .cell-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .cell-num { font-size: 10px; color: var(--num); letter-spacing: 0.12em; text-transform: uppercase; }
  .cell-line { flex: 1; height: 1px; background: var(--rule); }
  .frame {
    border: 1.5px solid var(--ink);
    overflow: hidden;
    background: #fff;
    line-height: 0;
  }
  .frame img {
    width: 100%;
    height: auto;
    display: block;
  }
  .copy-wrap {
    border: 1.5px solid var(--ink);
    border-top: none;
    background: var(--textarea-bg);
    position: relative;
  }
  .copy-label {
    display: none;
  }
  textarea {
    width: 100%;
    min-height: 130px;
    resize: none;
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.65;
    color: var(--ink);
    padding: 12px 12px 10px;
    outline: none;
  }
  textarea::placeholder { color: var(--rule); font-style: italic; }
  textarea:focus { background: #fffef9; }

  .intro-wrap {
    border: 1.5px solid var(--ink);
    background: var(--textarea-bg);
    margin-bottom: 36px;
    position: relative;
  }
  .intro-label {
    display: none;
  }
  .intro-title {
    font-family: 'Fraunces', serif;
    font-size: 11px;
    font-weight: 300;
    font-style: italic;
    color: var(--num);
    padding: 10px 14px 0;
    letter-spacing: 0.05em;
  }
  .intro-wrap textarea {
    width: 100%;
    min-height: 130px;
    resize: none;
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--ink);
    padding: 8px 14px 12px;
    outline: none;
  }
  .intro-wrap textarea::placeholder { color: var(--rule); font-style: italic; }
  .intro-wrap textarea:focus { background: #fffef9; }
</style>
</head>
<body>
<header>
  <h1>YouTube &ldquo;How to Tie a Tie&rdquo;</h1>

</header>
<div class="intro-wrap">
  <span class="intro-label">description</span>
  <div class="intro-title">Project overview</div>
  <textarea>YouTube is one of the greatest learning tools ever built. That's not its only function, but it's one of its core tenets as a brand.

This spot isn't looking to shift how people use YouTube. It's a reminder of what's always been there underneath: a tool that enables real human connection in ways that are small, unexpected, and worth remembering.</textarea>
</div>

const grid = document.getElementById("grid");
cells.forEach((b64, i) => {
  const cell = document.createElement("div");
  cell.className = "cell";
  const copy = sceneCopy[i] || "";
  cell.innerHTML = `
    <div class="frame">
      <img src="data:image/jpeg;base64,${b64}" alt="Panel ${i+1}">
    </div>
    <div class="copy-wrap">
      <span class="copy-label">copy</span>
      <textarea aria-label="Copy for panel ${i+1}">${copy}</textarea>
    </div>
  `;
  grid.appendChild(cell);
});

// Touch support for mobile
document.querySelectorAll(".cell").forEach(cell => {
  cell.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const isExpanded = cell.classList.contains("expanded");
    document.querySelectorAll(".cell.expanded").forEach(c => c.classList.remove("expanded"));
    if (!isExpanded) cell.classList.add("expanded");
  }, { passive: false });
});
// Collapse on tap outside
document.addEventListener("touchstart", (e) => {
  if (!e.target.closest(".cell")) {
    document.querySelectorAll(".cell.expanded").forEach(c => c.classList.remove("expanded"));
  }
});
</script>
